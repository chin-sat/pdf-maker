<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Maker</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* 📦 AD SPACE: TOP LEADERBOARD BANNER */
        .ad-top { width: 100%; max-width: 970px; min-height: 90px; background: #eaeaea; border: 2px dashed #bbb; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #777; border-radius: 4px; }

        .main-layout { display: flex; width: 100%; max-width: 970px; gap: 20px; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        
        /* 📦 AD SPACE: RIGHT SIDEBAR BANNER */
        .ad-sidebar { width: 300px; min-height: 600px; background: #eaeaea; border: 2px dashed #bbb; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #777; border-radius: 4px; }

        h1 { margin-top: 0; color: #2c3e50; }
        h2 { font-size: 16px; color: #7f8c8d; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; text-align: left; margin-top: 20px; }
        .control-group { text-align: left; margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; background: #fff; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .btn-text { background-color: #3498db; }
        .btn-image { background-color: #2ecc71; }

        /* Mobile Optimization: Stack layout elements on smaller screens */
        @media (max-width: 800px) {
            .main-layout { flex-direction: column; }
            .ad-sidebar { width: 100%; min-height: 250px; }
        }
    </style>
</head>
<body>

    <!-- TOP AD REVENUE BANNER PLACEHOLDER -->
    <div class="ad-top">
        <!-- Future AdSense Code Snippet Goes Here -->
        Advertisement Space (Leaderboard 970x90)
    </div>

    <div class="main-layout">
        <!-- CORE UTILITY BOX -->
        <div class="container">
            <h1>PDF Maker</h1>
            
            <h2>1. Text to PDF Conversion</h2>
            <div class="control-group">
                <label for="userInput">Type Your Text Content:</label>
                <textarea id="userInput" placeholder="Type text content here..."></textarea>
            </div>
            <button class="btn-text" onclick="AppController.handleTextDownload()">Download Text as PDF</button>

            <h2>2. Image to PDF Conversion</h2>
            <div class="control-group">
                <label for="imageInput">Upload Asset Image:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <button class="btn-image" onclick="AppController.handleImageDownload()">Download Image as PDF</button>
        </div>

        <!-- SIDEBAR AD REVENUE BANNER PLACEHOLDER -->
        <div class="ad-sidebar">
            <!-- Future AdSense Code Snippet Goes Here -->
            Advertisement Space (Sidebar 300x600)
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
